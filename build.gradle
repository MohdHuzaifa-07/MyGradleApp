// Apply plugins
apply plugin: 'java'
apply plugin: 'application'

// Repositories
repositories {
    mavenCentral()
}

// Dependencies
dependencies {
    implementation 'com.google.guava:guava:23.0'
    testImplementation 'junit:junit:4.12'
}

// Custom task
task display {
    doLast {
        println "Hello!! Bit Students"
    }
}

// Main class
mainClassName = 'App'
